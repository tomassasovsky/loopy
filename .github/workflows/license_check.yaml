name: license_check

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - master
    paths:
      - "pubspec.yaml"
      - ".github/workflows/license_check.yaml"
  push:
    branches:
      - master
    paths:
      - "pubspec.yaml"
      - ".github/workflows/license_check.yaml"

jobs:
  license_check:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/license_check.yml@v1
    with:
      flutter_version: "3.44.x"
      # Zlib covers vector_math, a permissive Flutter SDK transitive dependency.
      allowed: "MIT,BSD-3-Clause,BSD-2-Clause,Apache-2.0,Zlib"
      # pubspec_lock_parse reports no machine-detectable license on pub.dev (it is
      # a transitive dep of the very_good_cli tooling, not shipped app code), so
      # skip it rather than fail the run on an "unknown" classification.
      skip_packages: "pubspec_lock_parse"
