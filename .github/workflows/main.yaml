name: loopy

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  semantic-pull-request:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/semantic_pull_request.yml@v1

  build:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/flutter_package.yml@v1
    with:
      flutter_version: "3.44.x"
      run_bloc_lint: true
      # Keep the 90% gate for real logic, but exclude platform / entrypoint glue
      # that can't be meaningfully unit-tested: the custom window chrome
      # (window_manager), the desktop_multi_window output-waveform sub-window,
      # and the app bootstrap/entrypoint. Coverage on the remainder stays ~91%.
      min_coverage: 90
      coverage_excludes: "**/window_chrome.dart **/waveform_window*.dart **/run_loopy.dart **/bootstrap.dart **/session_directory.dart"

  # Compile-only desktop guards: prove the portable engine + app keep building on
  # Windows and Linux. No audio runs (CI has no devices). Flutter is pinned to the
  # same 3.44.x as the `build` job above so the matrix can't silently drift, and
  # tracks the dev toolchain so its dart_style matches local formatting.
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.x"
          channel: stable
          cache: true
      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: flutter build windows --debug --target lib/main_development.dart

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.x"
          channel: stable
          cache: true
      - name: Install GTK build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libglib2.0-dev \
            libpango1.0-dev libasound2-dev clang cmake pkg-config
      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - run: flutter build linux --debug --target lib/main_development.dart

  # ARM64 Linux guard for the Raspberry Pi 5 floor-console target (Pi OS is
  # arm64). Same compile-only contract as build-linux above — no audio runs (CI
  # has no devices) — but on a native arm64 runner so the bundle is built for the
  # Pi's architecture instead of x86_64. A native runner is used rather than
  # FLUTTER_TARGET_PLATFORM_SYSROOT cross-compilation (linux/CMakeLists.txt
  # honors that var) to avoid sysroot/toolchain drift; arm64 runners are free for
  # public repos.
  #
  # subosito/flutter-action is NOT used here: Flutter only publishes prebuilt SDK
  # archives for x64 Linux, so the action fails on arm64 with "Unable to
  # determine Flutter version ... architecture: arm64". Instead Flutter is
  # installed from git — the same way it is set up on an actual Pi — and the
  # tooling fetches the linux-arm64 Dart SDK + engine artifacts on first run.
  # Pinned to 3.44.4 (latest 3.44 patch) to track the 3.44.x the other build jobs
  # use; bump this together with them so the matrix can't silently drift.
  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7
      - name: Install Flutter (git, arm64 host)
        run: |
          git clone --depth 1 --branch 3.44.4 \
            https://github.com/flutter/flutter.git "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"
      - name: Install GTK build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libglib2.0-dev \
            libpango1.0-dev libasound2-dev clang cmake pkg-config
      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - run: flutter build linux --debug --target lib/main_development.dart

  # The native C engine + MIDI unit tests (the deterministic golden gate). They
  # need no audio device, so they run on Linux with just a C toolchain + ALSA
  # headers (the MIDI test links libasound). run_native_tests.sh builds and runs
  # both suites; a failed CHECK returns non-zero and fails the job. This is the
  # strongest correctness gate in the repo — keep it on every PR.
  native-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install C build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libasound2-dev
      - name: Build + run native engine/MIDI tests
        run: bash packages/loopy_engine/src/test/run_native_tests.sh

  # The control-sequence fuzzer: the REAL native engine (device-free pump) +
  # the real repository/bloc/cubits, driven by seeded random event sequences
  # and checked against the control-surface invariant spec
  # (lib/control/invariants.dart) after every settled step. Runs as its own
  # job because the reusable flutter_package test job can't build the engine
  # library first; the fuzz tests self-skip without LOOPY_ENGINE_LIB, keeping
  # plain `flutter test` green everywhere. Failures print a seed + a shrunk
  # replayable repro to paste into the corpus.
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install C build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Build the engine test library
        run: echo "LOOPY_ENGINE_LIB=$(bash packages/loopy_engine/tool/build_test_lib.sh)" >> "$GITHUB_ENV"
      - name: Run the control-sequence fuzzer
        run: |
          flutter pub get
          flutter test --tags fuzz

  # Compile-only macOS guard. macOS/iOS build the engine through the CocoaPods
  # podspec's per-file forwarders (macos/Classes/), NOT CMake, so a new native TU
  # can break the macOS link unless a forwarder is added — building here catches
  # that. The app is flavored (development/staging/production) and the macOS Xcode
  # project has only flavor-specific configurations (Debug-development, …), so the
  # build MUST pass --flavor (the CMake desktop builds don't, which is why
  # build-windows/linux omit it).
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.x"
          channel: stable
          cache: true
      - run: flutter config --enable-macos-desktop
      - run: flutter pub get
      - run: flutter build macos --debug --flavor development --target lib/main_development.dart

  # Build the seven Loopy FX VST3 plugins (packages/loopy_engine/vst3) and run
  # their CTest suite: GUID-drift, wrapper parameter round-trip, golden-parity
  # vs the engine DSP, and a per-plugin dlopen load-smoke against the assembled
  # bundle. This is the FIRST CI coverage of the plugins — they previously built
  # only in a Darwin-gated block of run_native_tests.sh that ran on no runner
  # (that block was removed; CTest is now the single definition). macOS only for
  # now: the CMake project is macOS-gated (Windows = part 13, Linux = part 14,
  # which add sibling vst3-plugins-{windows,linux} jobs). Debug config gives the
  # SDK its expected DEVELOPMENT=1. cmake ships on the macos-latest image.
  vst3-plugins-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Configure + build + test the VST3 plugins
        run: |
          cmake -S packages/loopy_engine/vst3 -B build/vst3 -DCMAKE_BUILD_TYPE=Debug
          cmake --build build/vst3
          ctest --test-dir build/vst3 --output-on-failure

  # Windows port (part 13): the same seven plugins + CTest suite on MSVC. The
  # default generator on windows-latest is multi-config (Visual Studio), so the
  # build type is chosen at build/test time (--config / -C Debug) rather than via
  # CMAKE_BUILD_TYPE. shell: bash so any failing step fails the job (set -e),
  # matching the macOS job. cmake ships on the windows-latest image.
  vst3-plugins-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: Configure + build + test the VST3 plugins
        shell: bash
        run: |
          cmake -S packages/loopy_engine/vst3 -B build/vst3
          cmake --build build/vst3 --config Debug
          ctest --test-dir build/vst3 -C Debug --output-on-failure

  spell-check:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/spell_check.yml@v1
    with:
      includes: |
        **/*.md
      modified_files_only: false
