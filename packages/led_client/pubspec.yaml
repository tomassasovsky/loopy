name: led_client
description: >-
  Console LED output for Loopy's Raspberry Pi floor console: serialises
  transport-state frames and pushes them over a UART serial link to the RP2040
  WS2812 driver MCU, with a boot-time ping/ack health handshake.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.11.0
  flutter: ^3.41.0

dependencies:
  equatable: ^2.0.7
  ffi: ^2.1.3
  flutter:
    sdk: flutter
  meta: ^1.16.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0
