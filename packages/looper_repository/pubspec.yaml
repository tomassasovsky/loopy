name: looper_repository
description: >-
  Repository layer that owns the loopy audio engine and projects its snapshots
  into looper domain models, exposing a Stream<LooperState> and commands.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.11.0
  flutter: ^3.41.0

dependencies:
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  loopy_engine:
    path: ../loopy_engine

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.5
  very_good_analysis: ^10.2.0
