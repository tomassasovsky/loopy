name: routing_graph
description: >-
  Reusable routing-graph UI primitives: a zoom/pan canvas, bezier wires, port
  chips, draggable effect-chain cards, and the geometry helpers that lay them
  out. Theming via a package-local RoutingGraphTheme extension.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.11.0
  flutter: ^3.41.0

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0
