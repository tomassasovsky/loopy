# ffigen configuration for the loopy_engine FFI plugin.
# Regenerate with:
#   dart run ffigen --config ffigen.yaml
#   dart format lib/src/generated/loopy_engine_bindings.dart
# The `dart format` pass is mandatory: ffigen emits legacy short-style code,
# while the committed bindings are canonical `dart format` (tall) style. Skipping
# it rewrites the entire file on every regen and hides the real change.
# (requires libclang; on macOS it ships with Xcode / Command Line Tools).
name: LoopyEngineBindings
description: |
  Generated low-level FFI bindings for the loopy_engine native audio engine.
  Do not edit by hand — see lib/src/audio_engine.dart for the typed Dart API.
output: 'lib/src/generated/loopy_engine_bindings.dart'
headers:
  entry-points:
    - 'src/loopy_engine_api.h'
  include-directives:
    - 'src/loopy_engine_api.h'
compiler-opts:
  - '-Isrc'
functions:
  include:
    - 'le_.*'
structs:
  include:
    - 'le_config'
    - 'le_snapshot'
    - 'le_track_snapshot'
    - 'le_loopback_info'
    - 'le_device_info'
enums:
  include:
    - 'le_result'
    - 'le_latency_state'
    - 'le_track_state'
    - 'le_command_code'
    - 'le_loopback_kind'
preamble: |
  // ignore_for_file: type=lint, doc_directive_unknown
  // coverage:ignore-file
comments:
  style: any
  length: full
