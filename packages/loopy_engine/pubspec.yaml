name: loopy_engine
description: >-
  Native low-latency duplex audio engine for Loopy, wrapping a hand-written
  miniaudio looping core via Dart FFI.
version: 0.1.0
publish_to: none
license: GPL-3.0-or-later

environment:
  sdk: ^3.11.0
  flutter: ^3.41.0

dependencies:
  collection: ^1.19.0
  ffi: ^2.1.3
  flutter:
    sdk: flutter
  meta: ^1.16.0

dev_dependencies:
  ffigen: ^18.0.0
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0

flutter:
  plugin:
    platforms:
      macos:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      windows:
        ffiPlugin: true
