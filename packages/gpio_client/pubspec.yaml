name: gpio_client
description: >-
  Raspberry Pi GPIO controller source for Loopy: reads footswitch pin edges over
  a libgpiod FFI seam and feeds raw inputs to the controller_repository as a
  ControllerSource, so a floor-console pedal can drive the looper hands-free.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.11.0
  flutter: ^3.41.0

dependencies:
  controller_repository:
    path: ../controller_repository
  ffi: ^2.1.3
  flutter:
    sdk: flutter
  meta: ^1.16.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0
