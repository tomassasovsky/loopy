name: midi_device_repository
description: >-
  Owns the MIDI input (foot-controller) device lifecycle for Loopy: enumerates,
  opens/closes, supervises hotplug, and persists the selection — projecting a
  MidiConnection domain stream for the presentation layer.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.11.0
  flutter: ^3.41.0

dependencies:
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  midi_client:
    path: ../midi_client
  settings_repository:
    path: ../settings_repository

dev_dependencies:
  controller_repository:
    path: ../controller_repository
  fake_async: ^1.3.1
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.5
  very_good_analysis: ^10.2.0
