# Loopy runs pipewire + wireplumber as its own two services (loopy-pipewire /
# loopy-wireplumber). pipewire's stock config also auto-launches wireplumber AND
# pipewire-pulse via context.exec — a second daemon that collided on the
# /run/user/1000/pipewire-0 socket lock and, with Restart=always, cascaded into a
# crash loop. Clear context.exec so our unit runs exactly one pipewire.
context.exec = [ ]
