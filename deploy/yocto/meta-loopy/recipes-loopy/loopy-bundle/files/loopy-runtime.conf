# weston runs as User=weston (uid 1000) but this minimal image has no logind
# login session for it, so /run/user/1000 is never created -> weston can't make
# its Wayland socket and crash-loops (status=6/ABRT). Create the XDG runtime dir
# declaratively at boot. Validated on device: with this present weston comes up
# 0-restarts and loopy connects to /run/user/1000/wayland-1.
d /run/user/1000 0700 weston weston -
