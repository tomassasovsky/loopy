# Default the Focusrite Scarlett to the Pro Audio profile: raw multichannel in/out
# (what a looper wants) instead of the consumer "Analog Surround" profile, and it
# exposes all capture channels incl. the built-in loopback pair. Matched by name so
# it applies on a fresh WirePlumber state (a clean flash).
monitor.alsa.rules = [
  {
    matches = [ { device.name = "~alsa_card.*[Ss]carlett.*" } ]
    actions = { update-props = { device.profile = "pro-audio" } }
  }
]
