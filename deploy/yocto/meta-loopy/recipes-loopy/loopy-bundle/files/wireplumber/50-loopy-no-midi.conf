# Loopy handles MIDI itself; PipeWire only does audio. The ALSA-MIDI (seq) monitor
# crashes pipewire on this Pi (SEGV in snd_seq_event_retrieve_buffer via
# alsa_seq_on_sys, backend-drm has nothing to do with it) when it probes the USB
# MIDI sequencer. Disable the MIDI monitors. Validated on-device: the intermittent
# pipewire SEGV stops entirely with this.
wireplumber.profiles = {
  main = {
    monitor.alsa-midi = disabled
    monitor.bluez-midi = disabled
  }
}
