[core]
# kiosk-shell: fullscreen, one app per output — the right model for an appliance.
shell=kiosk-shell.so
backend=drm-backend.so
# Blank nothing on an always-on stage unit.
idle-time=0

# --- Outputs: main UI + waveform on the two Pi 4 micro-HDMI ports ---------------
# Connector names come from DRM/KMS (weston logs them at startup; `weston-info`
# also lists them). Confirm on device; the two outputs extend left-to-right.
[output]
name=HDMI-A-1
mode=preferred

[output]
name=HDMI-A-2
mode=preferred

# kiosk-shell fullscreens one surface per output. The app opens its main window
# plus the waveform second window; verify which lands where and pin per-output if
# they swap (plan §Phase 5 — the Tier 3a analogue of pin-displays.sh).
