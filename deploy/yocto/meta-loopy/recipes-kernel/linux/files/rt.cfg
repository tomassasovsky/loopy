# Real-time (PREEMPT_RT) preemption model for glitch-free low-latency audio.
#
# Selectable on the 6.12 kernel (arm64 selects ARCH_SUPPORTS_RT there; it does NOT
# on 6.6). PREEMPT_RT is a member of the "Preemption Model" Kconfig choice and sits
# under EXPERT — set EXPERT and unset the other choice members so merge_config +
# olddefconfig resolve to RT cleanly. Verify CONFIG_PREEMPT_RT=y actually lands in
# the merged .config at do_kernel_configme (it silently drops to another model if
# the arch does not support it).
CONFIG_EXPERT=y
# CONFIG_PREEMPT_NONE is not set
# CONFIG_PREEMPT_VOLUNTARY is not set
# CONFIG_PREEMPT is not set
CONFIG_PREEMPT_RT=y
# High-resolution timers help regardless of the preemption model.
CONFIG_HIGH_RES_TIMERS=y
