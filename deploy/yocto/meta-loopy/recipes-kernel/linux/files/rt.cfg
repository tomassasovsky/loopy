# Real-time (PREEMPT_RT) preemption model for low-latency audio.
# PREEMPT_RT lives under EXPERT and is a member of the "Preemption Model" choice;
# unset the other members so merge_config + olddefconfig select RT cleanly.
CONFIG_EXPERT=y
# CONFIG_PREEMPT_NONE is not set
# CONFIG_PREEMPT_VOLUNTARY is not set
# CONFIG_PREEMPT is not set
CONFIG_PREEMPT_RT=y
# High-resolution timers + full tickless are needed for RT to be worthwhile.
CONFIG_HIGH_RES_TIMERS=y
CONFIG_NO_HZ_FULL=y
