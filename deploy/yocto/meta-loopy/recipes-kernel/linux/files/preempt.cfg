# Preemption model for low-latency audio.
#
# We WANTED CONFIG_PREEMPT_RT (fully preemptible / real-time), but on this Pi 4
# kernel (linux-raspberrypi 6.6) it is not selectable: PREEMPT_RT depends on
# EXPERT && ARCH_SUPPORTS_RT, and arm64 does not `select ARCH_SUPPORTS_RT` until
# ~6.11/6.12 (and this is not the -rt patchset). Setting CONFIG_PREEMPT_RT=y in a
# fragment is therefore silently dropped; worse, unsetting the other choices makes
# the model fall back to PREEMPT_NONE. So select CONFIG_PREEMPT (full "Low-Latency
# Desktop" preemption) — the best model available here. With the SCHED_FIFO audio
# thread + rtirq + performance governor this covers most of the benefit; true
# PREEMPT_RT needs a 6.12 kernel bump (arm64 selects ARCH_SUPPORTS_RT there) and is
# tracked separately.
CONFIG_PREEMPT=y
# High-resolution timers help regardless of the preemption model.
CONFIG_HIGH_RES_TIMERS=y
