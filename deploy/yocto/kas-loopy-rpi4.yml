# kas project for the Tier 3a spike (issue #284): a minimal Yocto/weston image
# for raspberrypi4-64 that runs our PREBUILT Flutter GTK bundle. Build it from an
# Apple-Silicon Mac with kas-container (native arm64):
#
#   ./kas-container build deploy/yocto/kas-loopy-rpi4.yml
#
# See deploy/yocto/README.md for the full flow. UNTESTED SCAFFOLD — the recipes
# below encode the research decisions but need iteration on the build host
# (blocked-verify per the plan). Branch/versions target walnascar.
header:
  version: 14

distro: poky
machine: raspberrypi4-64

target:
  - loopy-kiosk-image

repos:
  # This repo (contains meta-loopy). No url => the repo holding this kas file.
  loopy:
    layers:
      deploy/yocto/meta-loopy:

  poky:
    url: https://git.yoctoproject.org/poky
    branch: walnascar
    layers:
      meta:
      meta-poky:

  meta-openembedded:
    url: https://git.openembedded.org/meta-openembedded
    branch: walnascar
    layers:
      meta-oe:
      meta-python:
      meta-multimedia:

  meta-raspberrypi:
    url: https://git.yoctoproject.org/meta-raspberrypi
    branch: walnascar

local_conf_header:
  standard: |
    CONF_VERSION = "2"
    PACKAGE_CLASSES = "package_ipk"
    # Lean image: drop docs/dev/dbg splits for a spike.
    INHERIT += "rm_work"
    # Accept the Pi 4/5 WiFi firmware's restricted license (meta-raspberrypi).
    LICENSE_FLAGS_ACCEPTED = "synaptics-killswitch"

  init: |
    # systemd so we can order the app after weston with a unit.
    INIT_MANAGER = "systemd"

  kiosk-console: |
    # Keep the kernel console OFF the HDMI framebuffer so it never paints over
    # weston (on-device, audit + console spam covered the app). fbcon=map:9 moves
    # the framebuffer console away, audit=0 kills the audit flood, quiet/loglevel
    # trim kernel noise, and vt.global_cursor_default=0 hides the text cursor.
    #
    # video=HDMI-A-*:1920x1080@60 forces both micro-HDMI connectors to 1080p at
    # boot (the firmware/EDID default is the TV's 4K preferred mode). weston.ini
    # uses mode=current to inherit this. Set on both ports so it holds whichever
    # one the cable is in. Validated on a 4K LG TV -> came up 1920x1080@60.
    #
    # Audio real-time tuning: cpufreq.default_governor=performance pins the CPUs at
    # max clock (the default ondemand governor idles at 1.1 GHz mid-loop -> xruns).
    # threadirqs runs IRQ handlers as schedulable kernel threads so loopy-rtirq can
    # raise the USB sound-card IRQ above the audio thread (PREEMPT_RT force-threads
    # them anyway, but keep it explicit so it also holds on a non-RT fallback).
    CMDLINE:append = " console=tty3 fbcon=map:9 audit=0 quiet loglevel=3 logo.nologo vt.global_cursor_default=0 consoleblank=0 video=HDMI-A-1:1920x1080@60 video=HDMI-A-2:1920x1080@60 splash plymouth.ignore-serial-consoles cpufreq.default_governor=performance threadirqs"
    # Kill the Raspberry Pi firmware's rainbow test square at boot (the plymouth
    # segno splash replaces it). `splash` above triggers plymouth despite `quiet`.
    RPI_EXTRA_CONFIG:append = "\ndisable_splash=1"

  rpi-wayland: |
    # Pi 4 GPU + KMS so Mesa/Wayland/weston work. `pam` is required by systemd +
    # packagegroup-core-weston; keep x11 in so the image GTK3 stays a close ABI
    # match to our Ubuntu-built bundle (xwayland fallback also available).
    DISTRO_FEATURES:append = " wayland opengl systemd pam"
    # vc4/v3d KMS is enabled by default on raspberrypi4-64; force GL driver if needed:
    # RPI_KERNEL_DEVICETREE_OVERLAYS:append = " overlays/vc4-kms-v3d.dtbo"

  loopy: |
    # Install the prebuilt bundle recipe into the image. The recipe defaults
    # LOOPY_BUNDLE_DIR to deploy/yocto/prebuilt/bundle (staged by the build steps
    # in deploy/yocto/README.md); override here only to point elsewhere.
    IMAGE_INSTALL:append = " loopy-bundle"

    # Kernel: use the 6.12 LTS instead of meta-raspberrypi's weak default (6.6, in
    # rpi-default-versions.inc). arm64 only selects ARCH_SUPPORTS_RT from ~6.12, so
    # CONFIG_PREEMPT_RT is selectable here (it is NOT on 6.6). The linux-raspberrypi
    # bbappend adds the rt.cfg fragment that turns it on.
    PREFERRED_VERSION_linux-raspberrypi = "6.12.%"
