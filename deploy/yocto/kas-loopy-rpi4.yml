# kas project for the Tier 3a spike (issue #284): a minimal Yocto/weston image
# for raspberrypi4-64 that runs our PREBUILT Flutter GTK bundle. Build it from an
# Apple-Silicon Mac with kas-container (native arm64):
#
#   ./kas-container build deploy/yocto/kas-loopy-rpi4.yml
#
# See deploy/yocto/README.md for the full flow. UNTESTED SCAFFOLD — the recipes
# below encode the research decisions but need iteration on the build host
# (blocked-verify per the plan). Branch/versions target walnascar.
header:
  version: 14

distro: poky
machine: raspberrypi4-64

target:
  - loopy-kiosk-image

repos:
  # This repo (contains meta-loopy). No url => the repo holding this kas file.
  loopy:
    layers:
      deploy/yocto/meta-loopy:

  poky:
    url: https://git.yoctoproject.org/poky
    branch: walnascar
    layers:
      meta:
      meta-poky:

  meta-openembedded:
    url: https://git.openembedded.org/meta-openembedded
    branch: walnascar
    layers:
      meta-oe:
      meta-python:
      meta-multimedia:

  meta-raspberrypi:
    url: https://git.yoctoproject.org/meta-raspberrypi
    branch: walnascar

local_conf_header:
  standard: |
    CONF_VERSION = "2"
    PACKAGE_CLASSES = "package_ipk"
    # Lean image: drop docs/dev/dbg splits for a spike.
    INHERIT += "rm_work"
    # Accept the Pi 4/5 WiFi firmware's restricted license (meta-raspberrypi).
    LICENSE_FLAGS_ACCEPTED = "synaptics-killswitch"

  init: |
    # systemd so we can order the app after weston with a unit.
    INIT_MANAGER = "systemd"

  rpi-wayland: |
    # Pi 4 GPU + KMS so Mesa/Wayland/weston work. `pam` is required by systemd +
    # packagegroup-core-weston; keep x11 in so the image GTK3 stays a close ABI
    # match to our Ubuntu-built bundle (xwayland fallback also available).
    DISTRO_FEATURES:append = " wayland opengl systemd pam"
    # vc4/v3d KMS is enabled by default on raspberrypi4-64; force GL driver if needed:
    # RPI_KERNEL_DEVICETREE_OVERLAYS:append = " overlays/vc4-kms-v3d.dtbo"

  loopy: |
    # Install the prebuilt bundle recipe into the image. The recipe defaults
    # LOOPY_BUNDLE_DIR to deploy/yocto/prebuilt/bundle (staged by the build steps
    # in deploy/yocto/README.md); override here only to point elsewhere.
    IMAGE_INSTALL:append = " loopy-bundle"
