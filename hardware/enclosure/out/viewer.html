<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>VAMP — 3D viewer</title>
<style>
  html,body{margin:0;height:100%;background:#0f1623;color:#cbd5e1;font-family:Helvetica,Arial,sans-serif;overflow:hidden}
  #c{width:100vw;height:100vh;display:block}
  #hud{position:fixed;top:12px;left:14px;font-size:13px;line-height:1.5;background:#131c2ccc;padding:10px 13px;border-radius:8px;border:1px solid #2a3850;max-height:calc(100vh - 24px);overflow:auto;width:232px}
  #hud b{color:#f59e0b}
  #hud .k{color:#7c8aa3}
  button{background:#1c2740;color:#cbd5e1;border:1px solid #3b4a63;border-radius:6px;padding:5px 9px;font-size:12px;cursor:pointer;margin-top:6px}
  button:hover{background:#243149}
  .vsel.active{background:#2563eb;border-color:#3b82f6;color:#fff}
  #err{position:fixed;bottom:12px;left:14px;color:#f87171;font-size:12px}
  /* slicer-style component tree */
  #tree{margin-top:6px}
  #tree .cat{margin-top:9px}
  #tree .hdr{display:flex;align-items:center;gap:6px;color:#7c8aa3;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;margin:0 0 3px;cursor:pointer;user-select:none}
  #tree .hdr .caret{width:9px;display:inline-block;transition:transform .12s;color:#5f6c82}
  #tree .cat.collapsed .caret{transform:rotate(-90deg)}
  #tree .cat.collapsed .rows{display:none}
  #tree .hdr input{margin:0}
  #tree .row{display:flex;align-items:center;gap:7px;padding:2px 0 2px 4px;cursor:pointer;user-select:none}
  #tree .row input{margin:0;accent-color:#3b82f6;flex:none}
  #tree .row .dot{width:11px;height:11px;border-radius:3px;border:1px solid #00000055;flex:none}
  #tree .row .name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
  #tree .row .cnt{color:#5f6c82;font-size:11px;flex:none}
  #tree .row.dim{opacity:.4}
  #tree .row.dim .name{font-style:italic}
  .btnrow{display:flex;gap:6px;flex-wrap:wrap}
  hr{border:none;border-top:1px solid #24324a;margin:9px 0 3px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div><b>VAMP</b> loopstation · drag to rotate</div>
  <div class="k">drag = orbit · scroll = zoom · right-drag = pan</div>
  <div class="btnrow">
    <button id="spin">⏵ auto-spin</button>
    <button id="reset">⟲ reset view</button>
  </div>
  <div class="k" style="margin-top:8px">explode (separate layers)</div>
  <input id="explode" type="range" min="0" max="260" value="0" step="1" style="width:200px"/>
  <div class="k" style="margin-top:8px">build version</div>
  <div class="btnrow" style="margin-top:2px">
    <button id="vpi" class="vsel">Pi version</button>
    <button id="vbase" class="vsel">Base (no Pi)</button>
  </div>
  <hr/>
  <div class="k" style="display:flex;justify-content:space-between;align-items:center">
    <span>components</span>
    <span class="btnrow" style="margin:0">
      <button id="allon" style="margin:0;padding:2px 7px">all</button>
      <button id="alloff" style="margin:0;padding:2px 7px">none</button>
    </span>
  </div>
  <div id="tree"></div>
</div>
<div id="err"></div>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.45;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x18233a);

const camera = new THREE.PerspectiveCamera(40, innerWidth/innerHeight, 1, 100000);
const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true; controls.dampingFactor = 0.08;
window.__cam = camera; window.__ctl = controls;   // exposed for verification/debug

// Model is Z-up (explode lifts +Z). HemisphereLight's axis is set by .position, NOT
// .rotation (rotation is ignored) -- so put the sky at +Z (top), ground fill at -Z (bottom).
const hemi = new THREE.HemisphereLight(0xcfe0ff, 0x8794ad, 2.0);
hemi.position.set(0, 0, 1);
scene.add(hemi);
scene.add(new THREE.AmbientLight(0xb4c0d6, 1.5));   // base fill so no face is ever pitch black
const key = new THREE.DirectionalLight(0xffffff, 3.0); key.position.set(-1,2,1.3); scene.add(key);
const fill = new THREE.DirectionalLight(0xeaf2ff, 1.4); fill.position.set(1.5,0.6,0.8); scene.add(fill);
const back = new THREE.DirectionalLight(0x9fb6ff, 1.0); back.position.set(0.4,1.2,-1.2); scene.add(back);
const under = new THREE.DirectionalLight(0xc4d0e6, 1.9); under.position.set(0.3, -0.4, -2); scene.add(under);

// ---- component taxonomy (slicer-style): [category, key, label, name-matcher, opts] ----
// Matchers run first-to-last, most-specific first. opts.piOnly / opts.baseOnly = the part
// only exists in that build. Externally-loaded parts (match:null) are registered by hand.
const TYPES = [
  ['Chassis',       'base',        'Base shell',      n=>n==='base'],
  ['Chassis',       'lid',         'Lid / top plate', n=>n==='lid'],
  ['Chassis',       'rearpanel_pi','Rear panel',      n=>n.startsWith('rearpanel_pi'),   {piOnly:1}],
  ['Chassis',       'rearpanel_nopi','Rear panel',    n=>n.startsWith('rearpanel_nopi'), {baseOnly:1}],
  ['Foot controls', 'pedal',       'Foot pedals',     n=>n.startsWith('pedal')],
  ['Foot controls', 'plat',        'Pedal platforms', n=>n.startsWith('plat')],
  ['Joinery',       'cbracket',    'Corner brackets', n=>n.startsWith('cbracket')],
  ['Joinery',       'crivet',      'Rivets',          n=>n.startsWith('crivet')],
  ['Lid controls',  'lid_screen',  'Touch screens',   n=>n.startsWith('lid_screen')],
  ['Lid controls',  'lid_sclamp',  'Screen clamps',   n=>n.startsWith('lid_sclamp')],
  ['Lid controls',  'lid_ring',    'LED ring',        n=>n.startsWith('lid_ring')],
  ['Lid controls',  'lid_knob',    'Encoder knob',    n=>n.startsWith('lid_knob')],
  ['Electronics',   'board',       'Main board',      null],
  ['Electronics',   'pi',          'Raspberry Pi',    null, {piOnly:1}],
  ['Electronics',   'usbhat',      'USB hat',         null, {piOnly:1}],
  ['Electronics',   'board_so',    'Board standoffs', n=>n.startsWith('board_so')],
  ['Electronics',   'piriser',     'Pi risers',       n=>n.startsWith('piriser'), {piOnly:1}],
  ['Electronics',   'buckso',      'Buck standoffs',  n=>n.startsWith('buckso')],
  ['Electronics',   'buck',        'Power buck',      n=>n.startsWith('buck')],   // buck + buck_ind
].map(([cat,key,label,match,opts])=>({cat,key,label,match,piOnly:!!(opts&&opts.piOnly),baseOnly:!!(opts&&opts.baseOnly)}));
const byKey = Object.fromEntries(TYPES.map(t=>[t.key,t]));

const reg = {};                    // key -> {objs:[...]}
const hidden = {};                 // key -> true when user has toggled it off
let version = 'pi';
const collapsed = {};              // category -> true when collapsed

function classify(name){ for(const t of TYPES){ if(t.match && t.match(name)) return t.key; } return null; }
function register(key, obj){ (reg[key] || (reg[key]={objs:[]})).objs.push(obj); obj.userData.typeKey = key; }
function sampleColor(o){ let hex=null; o.traverse(m=>{ if(!hex && m.isMesh && m.material && m.material.color) hex='#'+m.material.color.getHexString(); }); return hex||'#7c8aa3'; }

let treePending = false;
function scheduleTree(){ if(treePending) return; treePending=true; requestAnimationFrame(()=>{ treePending=false; buildTree(); }); }

function buildTree(){
  const el = document.getElementById('tree'); el.innerHTML='';
  const cats = []; const seen = {};
  for(const t of TYPES){
    if(!reg[t.key] || !reg[t.key].objs.length) continue;
    if(!seen[t.cat]){ seen[t.cat] = {name:t.cat, rows:[]}; cats.push(seen[t.cat]); }
    seen[t.cat].rows.push(t);
  }
  for(const c of cats){
    const cd = document.createElement('div'); cd.className='cat'+(collapsed[c.name]?' collapsed':'');
    const hdr = document.createElement('div'); hdr.className='hdr';
    const caret = document.createElement('span'); caret.className='caret'; caret.textContent='▾';
    const cbAll = document.createElement('input'); cbAll.type='checkbox'; cbAll.title='toggle group';
    const title = document.createElement('span'); title.textContent=c.name; title.style.flex='1';
    hdr.append(caret, cbAll, title);
    hdr.onclick = (e)=>{ if(e.target===cbAll) return; collapsed[c.name]=!collapsed[c.name]; cd.classList.toggle('collapsed'); };
    cbAll.onclick = (e)=>e.stopPropagation();
    cbAll.onchange = ()=>{ for(const t of c.rows) hidden[t.key] = !cbAll.checked; applyVisibility(); };
    cd.appendChild(hdr);
    const rows = document.createElement('div'); rows.className='rows';
    for(const t of c.rows){
      const objs = reg[t.key].objs;
      const row = document.createElement('label'); row.className='row'; row.dataset.key=t.key;
      const cb = document.createElement('input'); cb.type='checkbox'; cb.checked=!hidden[t.key];
      cb.onchange = ()=>{ hidden[t.key]=!cb.checked; applyVisibility(); };
      const dot = document.createElement('span'); dot.className='dot'; dot.style.background=sampleColor(objs[0]);
      const nm = document.createElement('span'); nm.className='name'; nm.textContent=t.label;
      const cnt = document.createElement('span'); cnt.className='cnt'; cnt.textContent=objs.length>1?('×'+objs.length):'';
      row.append(cb, dot, nm, cnt);
      rows.appendChild(row);
    }
    cd.appendChild(rows);
    el.appendChild(cd);
  }
  applyVisibility();
}

function applyVisibility(){
  for(const t of TYPES){
    const r = reg[t.key]; if(!r) continue;
    const vSup = (t.piOnly && version!=='pi') || (t.baseOnly && version!=='base');   // hidden by build version
    const vis = !hidden[t.key] && !vSup;
    for(const o of r.objs) o.visible = vis;
    const row = document.querySelector('#tree .row[data-key="'+t.key+'"]');
    if(row){ row.classList.toggle('dim', vSup); const cb=row.querySelector('input'); if(cb) cb.checked=!hidden[t.key]; }
  }
  // category master checkboxes reflect all/some/none of their visible-in-this-version rows
  document.querySelectorAll('#tree .cat').forEach(cd=>{
    const boxes = [...cd.querySelectorAll('.rows .row:not(.dim) input')];
    const on = boxes.filter(b=>b.checked).length;
    const master = cd.querySelector('.hdr input');
    if(master){ master.checked = on>0; master.indeterminate = on>0 && on<boxes.length; }
  });
  document.getElementById('vpi').classList.toggle('active', version==='pi');
  document.getElementById('vbase').classList.toggle('active', version==='base');
}

let home = null;
new GLTFLoader().load('vamp_fromdxf.glb?t=' + Date.now(), (gltf)=>{
  const model = gltf.scene;
  // cadquery exports Z-up for this assembly (explode lifts +Z)
  model.traverse(o=>{ if(o.isMesh && o.material){ o.material.side = THREE.DoubleSide; } });
  model.updateMatrixWorld(true);
  const box = new THREE.Box3().setFromObject(model);
  const c = box.getCenter(new THREE.Vector3());
  const s = box.getSize(new THREE.Vector3());
  model.position.sub(c);                 // centre at origin
  scene.add(model);
  // classify the chassis parts by name (top-most named node wins, so submeshes don't double-count)
  model.traverse(o=>{
    if(!o.name) return;
    for(let p=o.parent; p; p=p.parent){ if(p.userData && p.userData.typeKey) return; }
    const k = classify(o.name); if(k) register(k, o);
  });
  // ---- electronics (all GLBs are Y-up; enclosure local frame is x=width(u), y=height,
  // z=-depth). ONE main board (THT Pro Micro loopy_pedal_main) in BOTH builds. PI build
  // adds a Raspberry Pi at the rear wall (power + UART/USB to the board) with its port
  // cluster out the I/O window; BASE build is the board alone (external host). The two rear
  // I/O sub-panels live in the chassis GLB (rearpanel_pi / rearpanel_nopi), toggled by name.
  const BU=175;                                    // electronics centred on the I/O window (u)
  // kicad-cli GLBs are in METRES (scale 1000); cadquery GLBs (the Pi) are already in MM (scale 1).
  // measured chassis seats (world y) + a robust PCB-plane finder (largest thin horizontal mesh)
  const tmpv = new THREE.Vector3();
  const topY = (pfx)=>{ let t=-1e9; model.traverse(o=>{ if(o.isMesh && (o.name||'').toLowerCase().startsWith(pfx)){
    if(!o.geometry.boundingBox) o.geometry.computeBoundingBox(); tmpv.copy(o.geometry.boundingBox.max).applyMatrix4(o.matrixWorld); t=Math.max(t,tmpv.y); } }); return t; };
  const standoffTopY = topY('board_so'), riserTopY = topY('piriser');
  const pcbPlaneY = (o)=>{ o.updateWorldMatrix(true,false); let bestA=0, y=null;
    o.traverse(m=>{ if(m.isMesh){ if(!m.geometry.boundingBox) m.geometry.computeBoundingBox(); const g=m.geometry.boundingBox;
      let mn=[1e9,1e9,1e9], mx=[-1e9,-1e9,-1e9];
      for(const cc of [[g.min.x,g.min.y,g.min.z],[g.max.x,g.max.y,g.max.z],[g.min.x,g.min.y,g.max.z],[g.max.x,g.max.y,g.min.z]]){
        tmpv.set(cc[0],cc[1],cc[2]).applyMatrix4(m.matrixWorld); for(let i=0;i<3;i++){const a='xyz'[i]; if(tmpv[a]<mn[i])mn[i]=tmpv[a]; if(tmpv[a]>mx[i])mx[i]=tmpv[a];} }
      const ar=(mx[0]-mn[0])*(mx[2]-mn[2]); if((mx[1]-mn[1])<6 && ar>bestA){ bestA=ar; y=mn[1]; } }}); return y; };
  const mk=(file,tag,typeKey,scl,placeFn,prep)=> new GLTFLoader().load(file+'?t='+Date.now(), (g)=>{
    const o=g.scene; o.scale.setScalar(scl);
    o.traverse(m=>{ if(m.isMesh&&m.material) m.material.side=THREE.DoubleSide; });
    if(prep) prep(o);
    o.updateMatrixWorld(true);
    const bb=new THREE.Box3().setFromObject(o), bc=bb.getCenter(new THREE.Vector3());
    placeFn(o,bb,bc); model.add(o); o.updateWorldMatrix(true,false);
    // seat the board's PCB plane on its standoffs/risers (measured, not derived)
    const pcb=pcbPlaneY(o), top=(tag==='pi'?riserTopY:standoffTopY);
    if(pcb!=null) o.position.y += (top - pcb);
    register(typeKey, o); scheduleTree(); applyVisibility();
  }, undefined, ()=>console.warn(file+' not loaded'));
  // placeFn sets X/Z; the post-placement correction above sets Y (PCB on the standoffs/risers)
  mk('loopy_pedal_tht.glb','common','board',1000,(o,bb,bc)=>o.position.set(BU-bc.x, 0, -274-bc.z));
  // Raspberry Pi — Pi build only: ports face the wall (rotate); PCB lands on the 38mm risers,
  // depth 373 so the USB/Ethernet sits flush in the rear window
  mk('raspberry_pi4.glb','pi','pi', 1, (o,bb,bc)=>o.position.set(BU-bc.x, 0, -373-bc.z),
     (o)=>{ o.rotation.y=Math.PI/2; });
  // USB hat stacked on the Pi (Pi build): board + USB-A block, model-local = enclosure coords
  const hat = new THREE.Group();
  const hatBoard = new THREE.Mesh(new THREE.BoxGeometry(56, 1.6, 64),
    new THREE.MeshStandardMaterial({color:0x114422, roughness:0.7}));
  const hatUsb = new THREE.Mesh(new THREE.BoxGeometry(30, 13, 14),
    new THREE.MeshStandardMaterial({color:0xc8ccd2, metalness:0.6, roughness:0.4}));
  hatUsb.position.set(0, 7, 30);                 // USB-A block toward the rear edge
  hat.add(hatBoard); hat.add(hatUsb);
  hat.position.set(BU, 60, -373); hat.name='pi_usbhat';
  model.add(hat); register('usbhat', hat);
  const r = Math.max(s.x,s.y,s.z);
  camera.position.set(-r*0.75, r*1.1, r*1.45);     // top-FRONT 3/4 (player side), 7" on the left
  controls.target.set(0,0,0);
  home = camera.position.clone();
  controls.update();
  // explode: separate the vertical layers -- base(0) < platforms(1) < pedals(2) < faceplate(3)
  const layerOf = (name)=>{ const n=(name||'').toLowerCase();
    return n.startsWith('plat')?1 : n.startsWith('pedal')?2 : n.startsWith('lid')?3 : 0; };
  model.traverse(o=>{ if(o.name){ const L=layerOf(o.name); if(L>0){ o.userData.L=L; o.userData.baseZ=o.position.z; lidParts.push(o); } } });
  const ex = document.getElementById('explode');
  ex.oninput = ()=>{ const off=parseFloat(ex.value); lidParts.forEach(o=> o.position.z = o.userData.baseZ + o.userData.L*off); };
  // ---- build-version selector: swap board + Pi + rear I/O sub-panel (visibility via applyVisibility) ----
  document.getElementById('vpi').onclick  = ()=>{ version='pi';   applyVisibility(); };
  document.getElementById('vbase').onclick= ()=>{ version='base'; applyVisibility(); };
  // ---- component tree: per-type visibility toggles grouped by category ----
  document.getElementById('allon').onclick  = ()=>{ for(const t of TYPES) hidden[t.key]=false; applyVisibility(); };
  document.getElementById('alloff').onclick = ()=>{ for(const t of TYPES) hidden[t.key]=true;  applyVisibility(); };
  buildTree();
  applyVisibility();
  // hooks for verification / scripting
  window.__setVersion = (v)=>{ version=v; applyVisibility(); };
  window.__setHidden  = (k,b)=>{ hidden[k]=b; applyVisibility(); };
  window.__reg = reg; window.__model = model;
}, undefined, (e)=>{ document.getElementById('err').textContent = 'load error: '+e; });
const lidParts = [];

let spin=false;
document.getElementById('spin').onclick = (e)=>{ spin=!spin; e.target.textContent = spin?'⏸ stop spin':'⏵ auto-spin'; };
document.getElementById('reset').onclick = ()=>{ if(home){camera.position.copy(home); controls.target.set(0,0,0); controls.update();} };

addEventListener('resize', ()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });
(function loop(){ requestAnimationFrame(loop); if(spin){ scene.rotation.y += 0.005; } controls.update(); renderer.render(scene,camera); })();
</script>
</body>
</html>
