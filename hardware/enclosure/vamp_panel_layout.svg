<svg viewBox="0 0 1180 700" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif" role="img">
  <title>VAMP enclosure — annotated faceplate + rear I/O (welded shell, integrated pedals, to scale, mm)</title>
  <desc>Top-down faceplate: 8 evenly-spaced Artesia ASP-1 pedal slots in a front row plus CLEAR/BANK aligned over UNDO and MODE, a status LED above each of the four track pedals only, an encoder with diffused LED ring below the left waveform screen, the 7 and 16 inch touchscreens top-aligned, and a simplified rear I/O panel.</desc>
  <defs><g id="badge"><circle r="9" fill="#f59e0b"/></g></defs>
  <rect x="0" y="0" width="1180" height="700" fill="#0f1623"/>
  <style>
    .b{fill:#0f1623;font-size:11px;font-weight:700;text-anchor:middle}
    .lt{fill:#cbd5e1;font-size:12px}.lp{fill:#7c8aa3;font-size:10.5px}
    .cap{fill:#94a3b8;font-size:12px;font-weight:600}
    .slot{fill:#1c2740;stroke:#8aa0c0;stroke-width:1.4}.trk{fill:#243149;stroke:#8aa0c0;stroke-width:1.4}.led{fill:#22c55e}
  </style>

  <g transform="translate(24,40)">
    <text x="0" y="-14" class="cap">TOP FACEPLATE — top view, player's-eye · 846 × 468 mm · welded shell</text>
    <rect x="0" y="0" width="846" height="468" rx="9" fill="#131c2c" stroke="#5b6b86" stroke-width="2"/>

    <!-- screens, top edges aligned -->
    <rect x="460" y="23" width="350" height="199" rx="5" fill="#0c1a24" stroke="#38bdf8" stroke-width="2"/>
    <text x="635" y="127" fill="#4a7f96" font-size="13" text-anchor="middle">16" TOUCH · main UI</text>
    <rect x="30" y="23" width="156" height="88" rx="4" fill="#0c1a24" stroke="#38bdf8" stroke-width="1.8"/>
    <text x="108" y="71" fill="#4a7f96" font-size="11" text-anchor="middle">7" TOUCH · waveform</text>

    <!-- CLEAR / BANK over UNDO / MODE, bottoms aligned with the 16" screen bottom -->
    <rect class="slot" x="225.4" y="119" width="78" height="103" rx="3"/>
    <rect class="slot" x="331.1" y="119" width="78" height="103" rx="3"/>
    <g fill="#9fb0c8" font-size="8" text-anchor="middle"><text x="264.4" y="112">CLEAR</text><text x="370.1" y="112">BANK</text></g>

    <!-- encoder + ring on the vertical centre line of CLEAR/BANK, in front of them -->
    <circle cx="317.25" cy="279.25" r="29" fill="none" stroke="#a855f7" stroke-width="6" stroke-opacity="0.5"/>
    <circle cx="317.25" cy="279.25" r="29" fill="none" stroke="#a855f7" stroke-width="1.4"/><circle cx="317.25" cy="279.25" r="3.4" fill="#cbd5e1"/>
    <circle cx="275.25" cy="279.25" r="4.5" fill="#22c55e"/><circle cx="359.25" cy="279.25" r="4.5" fill="#f59e0b"/>

    <!-- front row: 8 evenly spaced -->
    <g>
      <rect class="slot" x="13.9" y="336.5" width="78" height="103" rx="3"/>
      <rect class="slot" x="119.6" y="336.5" width="78" height="103" rx="3"/>
      <rect class="slot" x="225.4" y="336.5" width="78" height="103" rx="3"/>
      <rect class="slot" x="331.1" y="336.5" width="78" height="103" rx="3"/>
      <rect class="trk" x="436.9" y="336.5" width="78" height="103" rx="3"/>
      <rect class="trk" x="542.6" y="336.5" width="78" height="103" rx="3"/>
      <rect class="trk" x="648.4" y="336.5" width="78" height="103" rx="3"/>
      <rect class="trk" x="754.1" y="336.5" width="78" height="103" rx="3"/>
      <!-- track LEDs only, aligned -->
      <g class="led"><circle cx="475.9" cy="320.5" r="3.3"/><circle cx="581.6" cy="320.5" r="3.3"/><circle cx="687.4" cy="320.5" r="3.3"/><circle cx="793.1" cy="320.5" r="3.3"/></g>
      <g fill="#9fb0c8" font-size="8" text-anchor="middle">
        <text x="52.9" y="455">REC/PLAY</text><text x="158.6" y="455">STOP</text><text x="264.4" y="455">UNDO</text><text x="370.1" y="455">MODE</text>
        <text x="475.9" y="455">TRACK1</text><text x="581.6" y="455">TRACK2</text><text x="687.4" y="455">TRACK3</text><text x="793.1" y="455">TRACK4</text>
      </g>
    </g>

    <g>
      <use href="#badge" x="52.9" y="388"/><text x="52.9" y="392" class="b">1</text>
      <use href="#badge" x="264.4" y="170"/><text x="264.4" y="174" class="b">2</text>
      <use href="#badge" x="793.1" y="320.5"/><text x="793.1" y="324.5" class="b">7</text>
      <use href="#badge" x="108" y="33"/><text x="108" y="37" class="b">3</text>
      <use href="#badge" x="635" y="33"/><text x="635" y="37" class="b">4</text>
      <use href="#badge" x="317.25" y="248"/><text x="317.25" y="252" class="b">5</text>
      <use href="#badge" x="246" y="279.25"/><text x="246" y="283.25" class="b">6</text>
    </g>
  </g>

  <!-- ===================== REAR I/O ===================== -->
  <g transform="translate(24,560)">
    <text x="0" y="-14" class="cap">REAR I/O PANEL — rear elevation · 846 × 100 mm</text>
    <rect x="0" y="0" width="846" height="100" rx="6" fill="#131c2c" stroke="#5b6b86" stroke-width="2"/>
    <circle cx="60" cy="45" r="9" fill="#0f1623" stroke="#cbd5e1" stroke-width="1.5"/><circle cx="110" cy="45" r="10" fill="#1c2740" stroke="#cbd5e1" stroke-width="1.5"/>
    <circle cx="160" cy="45" r="9" fill="#0f1623" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect x="203" y="38" width="14" height="14" fill="#0f1623" stroke="#cbd5e1" stroke-width="1.3"/><rect x="238" y="38" width="14" height="14" fill="#0f1623" stroke="#cbd5e1" stroke-width="1.3"/>
    <circle cx="300" cy="78" r="5" fill="#0f1623" stroke="#22c55e" stroke-width="1.6"/>
    <g fill="none" stroke="#7c8aa3" stroke-width="1.1"><g transform="translate(360,30)">
      <rect x="0" y="0" width="40" height="4"/><rect x="54" y="0" width="40" height="4"/><rect x="108" y="0" width="40" height="4"/><rect x="162" y="0" width="40" height="4"/><rect x="216" y="0" width="40" height="4"/><rect x="270" y="0" width="40" height="4"/>
      <rect x="0" y="9" width="40" height="4"/><rect x="54" y="9" width="40" height="4"/><rect x="108" y="9" width="40" height="4"/><rect x="162" y="9" width="40" height="4"/><rect x="216" y="9" width="40" height="4"/><rect x="270" y="9" width="40" height="4"/>
      <rect x="0" y="18" width="40" height="4"/><rect x="54" y="18" width="40" height="4"/><rect x="108" y="18" width="40" height="4"/><rect x="162" y="18" width="40" height="4"/><rect x="216" y="18" width="40" height="4"/><rect x="270" y="18" width="40" height="4"/></g></g>
    <g>
      <use href="#badge" x="60" y="22"/><text x="60" y="26" class="b">8</text><use href="#badge" x="110" y="22"/><text x="110" y="26" class="b">9</text>
      <use href="#badge" x="160" y="22"/><text x="160" y="26" class="b">10</text><use href="#badge" x="225" y="22"/><text x="225" y="26" class="b">11</text>
      <use href="#badge" x="300" y="55"/><text x="300" y="59" class="b">12</text><use href="#badge" x="515" y="22"/><text x="515" y="26" class="b">13</text></g>
  </g>

  <g transform="translate(895,40)">
    <text x="0" y="-14" class="cap">What each cutout is for</text>
    <use href="#badge" x="9" y="9"/><text x="9" y="13" class="b">1</text><text x="26" y="7" class="lt">Pedal slot — front row ×8</text><text x="26" y="22" class="lp">evenly spaced · whole ASP-1 on welded platform</text>
    <use href="#badge" x="9" y="44"/><text x="9" y="48" class="b">2</text><text x="26" y="42" class="lt">CLEAR / BANK ×2</text><text x="26" y="57" class="lp">row 2, aligned over UNDO &amp; MODE</text>
    <use href="#badge" x="9" y="79"/><text x="9" y="83" class="b">3</text><text x="26" y="77" class="lt">7" touchscreen (left)</text><text x="26" y="92" class="lp">waveform · 156×88 · top-aligned</text>
    <use href="#badge" x="9" y="114"/><text x="9" y="118" class="b">4</text><text x="26" y="112" class="lt">16" touchscreen (right)</text><text x="26" y="127" class="lp">main UI · 350×199 · top-aligned</text>
    <use href="#badge" x="9" y="149"/><text x="9" y="153" class="b">5</text><text x="26" y="147" class="lt">Encoder + diffused ring</text><text x="26" y="162" class="lp">centred between CLEAR &amp; BANK · 12 THT LEDs</text>
    <use href="#badge" x="9" y="184"/><text x="9" y="188" class="b">6</text><text x="26" y="182" class="lt">Power / Mode LED</text><text x="26" y="197" class="lp">Ø8 bezel, flanking the encoder</text>
    <use href="#badge" x="9" y="219"/><text x="9" y="223" class="b">7</text><text x="26" y="217" class="lt">Track status LED ×4</text><text x="26" y="232" class="lp">Ø5.1 THT, aligned above TRACK 1–4 only</text>
    <line x1="0" y1="250" x2="270" y2="250" stroke="#26344a"/>
    <text x="0" y="272" class="lp">8 9V DC · 9 power btn · 10 fuse · 11 USB-A×2</text>
    <text x="0" y="290" class="lp">12 M6 earth stud · 13 rear vents (+ bottom intake)</text>
    <text x="0" y="316" class="lp">Service: unbolt the removable vented BOTTOM plate.</text>
    <text x="0" y="334" class="lp">Pedal slot/platform dims PROVISIONAL — measure a real ASP-1.</text>
    <text x="0" y="352" class="lp">Welded shell · 2.0 mm 5052-H32 Al · slope 6.75°.</text>
  </g>
</svg>
