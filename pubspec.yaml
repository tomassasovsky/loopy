name: loopy
description: Loopy — a cross-platform desktop loopstation with a native low-latency audio engine
version: 1.0.0+1
publish_to: none
license: GPL-3.0-or-later

environment:
  sdk: ^3.11.0
  flutter: ^3.41.0

dependencies:
  bloc: ^9.2.1
  controller_repository:
    path: packages/controller_repository
  desktop_multi_window: ^0.2.0
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  looper_repository:
    path: packages/looper_repository
  loopy_engine:
    path: packages/loopy_engine
  path_provider: ^2.1.4
  routing_graph:
    path: packages/routing_graph
  session_repository:
    path: packages/session_repository
  settings_repository:
    path: packages/settings_repository

dev_dependencies:
  bloc_lint: ^0.4.1
  bloc_test: ^10.0.0
  bloc_tools: ^0.1.0-dev.24
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mocktail: ^1.0.5
  very_good_analysis: ^10.2.0

flutter:
  generate: true
  uses-material-design: true
