name: loopy
description: Loopy — a cross-platform desktop loopstation with a native low-latency audio engine
version: 1.0.0+1
publish_to: none
license: GPL-3.0-or-later

environment:
  sdk: ^3.11.0
  flutter: ^3.41.0

dependencies:
  bloc: ^9.2.1
  controller_repository:
    path: packages/controller_repository
  desktop_multi_window: ^0.3.0
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter
  gpio_client:
    path: packages/gpio_client
  intl: ^0.20.2
  led_client:
    path: packages/led_client
  looper_repository:
    path: packages/looper_repository
  midi_device_repository:
    path: packages/midi_device_repository
  path_provider: ^2.1.6
  pedal_repository:
    path: packages/pedal_repository
  routing_graph:
    path: packages/routing_graph
  session_repository:
    path: packages/session_repository
  settings_repository:
    path: packages/settings_repository
  url_launcher: ^6.3.0
  window_manager: ^0.5.1

dev_dependencies:
  bloc_lint: ^0.4.1
  bloc_test: ^10.0.0
  bloc_tools: ^0.1.0-dev.24
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  # Data packages used directly by the test suite only (fakes + integration
  # tests import them); production code reaches them transitively via the
  # repositories, so they are dev-only here.
  loopy_engine:
    path: packages/loopy_engine
  midi_client:
    path: packages/midi_client
  mocktail: ^1.0.5
  very_good_analysis: ^10.3.0

flutter:
  generate: true
  uses-material-design: true
  fonts:
    - family: Space Grotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk.ttf
    - family: IBM Plex Mono
      fonts:
        - asset: assets/fonts/IBMPlexMono-Regular.ttf
        - asset: assets/fonts/IBMPlexMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexMono-SemiBold.ttf
          weight: 600
